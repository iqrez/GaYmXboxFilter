; GaYm Controller Configuration
; Edit this file to change feeder behavior.

[General]
; Input provider: keyboard, mouse, network, macro, config
Provider    = keyboard
; Report injection rate in Hz (125 = 8ms interval)
PollRateHz  = 125
; Which controller to attach to (0 = first found)
DeviceIndex = 0

[Jitter]
; Add random timing variation to avoid detection
Enabled = false
MinUs   = 500
MaxUs   = 2000

[Network]
; UDP listener for remote input injection
BindAddr = 127.0.0.1
Port     = 43210

[Macros]
; CSV macro file for playback (columns: delay_ms, buttons, dpad, lt, rt, lx, ly, rx, ry)
File = macro.csv
Loop = false
